<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link data-trunk rel="rust" href="Cargo.toml" />
    <title>Messenger Clone</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; }
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 360px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #eee; }
        .sidebar-header h1 { margin: 0; font-size: 24px; color: #050505; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 16px; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; }
        .chat-item:hover { background-color: #f2f2f2; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #ccc; margin-right: 12px; }

        /* Chat Window Styles */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { height: 60px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: white; }
        
        /* Message Bubbles */
        .message { max-width: 60%; padding: 8px 12px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .message.sent { align-self: flex-end; background-color: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background-color: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }

        /* Input Area */
        .input-area { padding: 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 10px 16px; border-radius: 20px; border: none; background: #f0f2f5; outline: none; font-size: 15px; }
        .send-btn { color: #0084ff; font-weight: bold; cursor: pointer; padding: 0 8px; border: none; background: none; }

        /* iOS Switch Styles */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00a400; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body>
</body>
</html>
